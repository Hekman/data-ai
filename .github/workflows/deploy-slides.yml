name: Deploy slides

# Builds every week's Slidev deck into a static site and publishes it to GitHub Pages.
# Students just open the URL — no install, no compiling.

on:
  push:
    branches: [main]
    paths:
      - "block-*/**/slides.md"
      - "scripts/build-slides.mjs"
      - "package.json"
      - ".github/workflows/deploy-slides.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build all decks
        run: node scripts/build-slides.mjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
